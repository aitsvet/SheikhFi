<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SheikhFi — console (v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Brand — pink-blue gradient preserved */
    --blue: #386bb9;
    --blue-2: #2a559a;
    --blue-soft: #e6edf8;
    --pink: #e51f78;
    --pink-2: #c4185f;
    --pink-soft: #fde4ee;
    --grad: linear-gradient(135deg, #386bb9 0%, #e51f78 100%);
    --grad-soft: linear-gradient(135deg, #e6edf8 0%, #fde4ee 100%);
    --grad-faint: linear-gradient(135deg, rgba(56,107,185,0.06) 0%, rgba(229,31,120,0.06) 100%);

    /* Surfaces — paper-on-canvas, like CryptoSarf but tinted cool */
    --paper: #ffffff;
    --paper-2: #faf8fc;
    --canvas: #efecf4;
    --ink: #181530;
    --ink-2: #4a4458;
    --ink-3: #8a8198;
    --rule: rgba(24, 21, 48, 0.10);
    --rule-2: rgba(24, 21, 48, 0.05);
    --row-bg: #f4f2f8;

    /* Role accents */
    --role-council:  #6a4ab0;  /* owner — purple-ish, between the two brand poles */
    --role-operator: #386bb9;  /* manager — blue */
    --role-partner:  #e51f78;  /* investor — pink */

    --shadow-1: 0 1px 2px rgba(24,21,48,0.05), 0 2px 8px rgba(24,21,48,0.04);
    --shadow-2: 0 8px 28px rgba(56,107,185,0.10), 0 1px 3px rgba(229,31,120,0.06);

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;

    --sidebar-w: 248px;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; color: var(--ink);
    font-family: "Inter", system-ui, sans-serif; font-size: 14px; line-height: 1.5;
  }
  body {
    background-color: var(--canvas);
    background-image:
      linear-gradient(rgba(255,255,255,0.55), rgba(255,255,255,0.55)),
      url('./bg.webp');
    background-repeat: repeat, repeat;
    background-size: auto, 40%;
    background-position: center, center top;
    background-attachment: fixed, fixed;
    min-height: 100vh;
  }
  a { color: var(--blue-2); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: inherit; }

  /* Type */
  .ar { font-family: "Amiri", "Times New Roman", serif; }
  .serif { font-family: "Cormorant Garamond", "DM Serif Display", Georgia, serif; }
  .num   { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .mono  { font-family: "JetBrains Mono", ui-monospace, monospace; }

  /* App shell */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: sticky; top: 0; align-self: start;
    height: 100vh;
    display: flex; flex-direction: column;
    padding: 24px 16px;
    background: var(--paper);
    border-right: 1px solid var(--rule);
  }
  .brand {
    display: flex; flex-direction: column; gap: 2px;
    padding: 4px 8px 18px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 14px;
  }
  .brand .ar-mark {
    font-family: "Amiri", serif; font-size: 28px; line-height: 1;
    background: var(--grad);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .brand .latin {
    font-family: "Cormorant Garamond", serif; font-size: 18px;
    color: var(--ink); letter-spacing: 0.02em; font-weight: 500;
  }
  .brand .sub {
    color: var(--ink-3); font-size: 11px; letter-spacing: 0.06em;
    text-transform: uppercase; margin-top: 2px;
  }

  .nav-section {
    display: flex; flex-direction: column; gap: 2px;
    margin-bottom: 18px;
  }
  .nav-section-label {
    padding: 6px 10px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3);
  }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 8px 10px; border-radius: var(--r-sm);
    color: var(--ink-2); font-size: 13px; font-weight: 500;
    cursor: pointer; background: transparent; border: none; text-align: left;
    transition: background .12s, color .12s;
  }
  .nav-item:hover { background: var(--paper-2); color: var(--ink); }
  .nav-item.active {
    background: var(--grad-faint); color: var(--ink); font-weight: 600;
    box-shadow: inset 2px 0 0 var(--pink), inset 0 0 0 1px var(--rule-2);
  }
  .nav-item .label { display: flex; align-items: center; gap: 8px; }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .nav-item .count {
    font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px;
    color: var(--ink-3); background: var(--paper-2);
    padding: 1px 6px; border-radius: 999px;
  }
  .nav-item.active .count { background: var(--paper); color: var(--ink-2); }

  .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--rule); }

  .identity-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 10px 12px;
    box-shadow: var(--shadow-1);
  }
  .identity-card .who { display: flex; align-items: center; gap: 8px; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--grad); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 12px; flex-shrink: 0;
  }
  .identity-card .name { font-weight: 600; font-size: 13px; line-height: 1.1; }
  .identity-card .addr { font-size: 11px; color: var(--ink-3); }
  .identity-card .switch {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--rule-2);
    font-size: 11px; color: var(--ink-3);
  }
  .identity-card .switch-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .identity-card .switch-row button {
    padding: 3px 8px; font-size: 11px; border-radius: 4px;
    border: 1px solid var(--rule); background: var(--paper-2); cursor: pointer;
    color: var(--ink-2); font-weight: 500;
  }
  .identity-card .switch-row button.active {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }

  /* Main column */
  .main { padding: 28px 36px 60px; max-width: 1200px; width: 100%; }
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; margin-bottom: 20px;
    padding: 22px 26px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-1);
  }
  .page-head .crumb {
    font-size: 12px; color: var(--ink-3); letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .page-head h1 {
    margin: 0;
    font-family: "Cormorant Garamond", serif;
    font-weight: 500; font-size: 36px; line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .page-head .lede { color: var(--ink-2); font-size: 13px; max-width: 60ch; margin-top: 6px; }
  .page-head .actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  /* Cards (CryptoSarf-style card-head + body) */
  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-1);
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--rule);
  }
  .card-head h3 {
    margin: 0;
    font-family: "Cormorant Garamond", serif;
    font-weight: 500; font-size: 20px; letter-spacing: -0.005em;
  }
  .card-head .sub { color: var(--ink-3); font-size: 12px; }
  .card-head .head-actions { display: flex; gap: 6px; }
  .card-body { padding: 18px 20px; }
  .card-pad { padding: 18px 20px; }

  /* KPI strip */
  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 14px 16px;
    position: relative; overflow: hidden;
  }
  .kpi::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--grad); opacity: 0.7;
  }
  .kpi .label {
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600;
  }
  .kpi .value {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 22px; font-weight: 500; color: var(--ink);
    margin-top: 4px; line-height: 1.2;
  }
  .kpi .value .unit { color: var(--ink-3); font-size: 13px; font-weight: 400; margin-left: 4px; }
  .kpi .hint { font-size: 11px; color: var(--ink-3); margin-top: 4px; }

  /* Grid helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stack > * + * { margin-top: 16px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--r-md);
    border: 1px solid var(--rule);
    background: var(--paper); color: var(--ink);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background .15s, border-color .15s, transform .08s;
    box-shadow: var(--shadow-1); white-space: nowrap;
  }
  .btn:hover:not(:disabled) { border-color: var(--blue); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary {
    background: var(--grad); color: #fff; border: none;
  }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.06); }
  .btn-ghost { background: transparent; border-color: transparent; box-shadow: none; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Inputs */
  .input, .select {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 8px 12px;
    font-size: 13px; font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .input:focus, .select:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(56,107,185,0.12);
  }
  .input { width: 180px; }
  .select { cursor: pointer; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .field-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }

  /* Tables */
  .table { width: 100%; background: var(--paper); color: var(--ink); border-collapse: collapse; font-size: 13px; }
  .table th { text-align: left; padding: 10px 16px; background: var(--paper-2); font-weight: 600; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--rule); }
  .table td { padding: 10px 16px; border-top: 1px solid var(--rule-2); }
  .table tbody tr:hover { background: var(--paper-2); }
  .right  { text-align: right; }
  .center { text-align: center; }

  /* Proposal cards (replaces the giant table) */
  .proposal {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    transition: border-color .15s, box-shadow .15s;
  }
  .proposal:hover { border-color: var(--blue); box-shadow: var(--shadow-2); }
  .proposal h4 {
    margin: 0 0 6px;
    font-family: "Cormorant Garamond", serif;
    font-weight: 500; font-size: 19px; line-height: 1.2;
  }
  .proposal .meta { display: flex; flex-wrap: wrap; gap: 10px; color: var(--ink-3); font-size: 12px; }
  .proposal .meta strong { color: var(--ink-2); font-weight: 500; }
  .proposal .progress-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 10px;
  }
  .progress {
    flex: 1; height: 6px; background: var(--row-bg); border-radius: 999px; overflow: hidden;
    position: relative;
  }
  .progress > span {
    display: block; height: 100%; background: var(--grad); border-radius: 999px;
    transition: width .3s ease;
  }
  .progress .threshold {
    position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--ink-3);
    border-radius: 1px;
  }
  .proposal .pside { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; min-width: 140px; }
  .proposal .amount {
    font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 18px; font-weight: 500;
  }
  .proposal .amount .unit { color: var(--ink-3); font-size: 12px; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: var(--row-bg); color: var(--ink-2);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .badge-blue { background: var(--blue-soft); color: var(--blue-2); }
  .badge-pink { background: var(--pink-soft); color: var(--pink-2); }
  .badge-ok   { background: #dff5e3; color: #1a6c34; }
  .badge-warn { background: #fff3d6; color: #8a6a18; }

  /* Section divider with serif label (CryptoSarf-style) */
  .section-rule {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 12px;
  }
  .section-rule h2 {
    margin: 0;
    font-family: "Cormorant Garamond", serif;
    font-weight: 500; font-size: 22px; letter-spacing: -0.005em;
  }
  .section-rule .line { flex: 1; height: 1px; background: var(--rule); }

  /* Wallet pill */
  .wallet-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 999px;
    background: var(--grad-faint); border: 1px solid var(--rule);
    font-size: 12px; color: var(--ink-2);
  }
  .wallet-pill .num { color: var(--ink); font-weight: 600; }

  /* Empty states */
  .empty {
    padding: 32px 20px; text-align: center; color: var(--ink-3);
    font-family: "Cormorant Garamond", serif; font-size: 16px; font-style: italic;
  }

  /* Tx status line */
  .tx-status {
    margin-top: 10px; font-size: 12px; color: var(--ink-3); min-height: 1.4em;
  }
  .tx-status.err { color: var(--pink-2); }
  .tx-status.ok  { color: #1a6c34; }

  /* Responsive — collapse sidebar on narrow */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--rule); }
    .main { padding: 20px; }
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/state.jsx"></script>
  <script type="text/babel" src="app/sidebar.jsx"></script>
  <script type="text/babel" src="app/overview.jsx"></script>
  <script type="text/babel" src="app/proposals.jsx"></script>
  <script type="text/babel" src="app/treasury.jsx"></script>
  <script type="text/babel" src="app/members.jsx"></script>
  <script type="text/babel" src="app/desk.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
