# Build the SheikhFi webapp and force-push the static dist/ to the
# `gh-pages` branch as an orphan single commit. Runs on every push to
# main, plus manual workflow_dispatch.
#
# Vite is configured with `base: './'` so the bundle uses relative
# asset paths — no env vars needed at build time.

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install
        working-directory: webapp
        run: npm ci

      - name: Build
        working-directory: webapp
        run: npm run build

      - name: Push dist to gh-pages (orphan)
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          cd webapp/dist
          touch .nojekyll
          git init -q -b gh-pages
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -q -m "pages: $(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)"
          git push -q -f origin gh-pages
