# On-demand Node/Hardhat toolbox: `docker compose run --rm node '<cmd>'`.
# Profile-gated so it never auto-starts. Examples:
#   docker compose run --rm node 'npm ci && npx hardhat test'
#   docker compose run --rm node 'cd webapp && npm ci && npm run lint && npm run build'
# node_modules / artifacts / cache land in the bind-mounted repo, so
# subsequent runs reuse them. Node pinned to the version README targets.
services:
  node:
    image: node:20.19.0
    profiles: ["tools"]
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    environment:
      HOME: /app/.docker-home
      npm_config_update_notifier: "false"
    volumes:
      - .:/app
    entrypoint: ["bash", "-c"]

  # ------------------------------------------------------- formal verification
  # Halmos (a16z) symbolically executes test/verify/Verify.t.sol and PROVES the
  # check_* properties for every input, or prints a counterexample. Unlike the
  # invariant walk in test/Invariants.test.js it cannot merely fail to find a
  # bug. Proofs are bounded — see the header of Verify.t.sol.
  #   docker compose run --rm halmos
  halmos:
    image: ghcr.io/a16z/halmos:0.3.3
    profiles: ["tools"]
    # Runs as root: the image's python venv lives under /root and is unreadable
    # to any other uid. Its only outputs are out/ and forge-cache/ — both
    # gitignored, and both kept off Hardhat's artifacts/ and cache/ (foundry.toml)
    # so a root-owned forge build cannot break `npx hardhat test`.
    working_dir: /app
    environment:
      HOME: /tmp
    volumes:
      - .:/app
    entrypoint: ["halmos"]
    # --loop 4       : the write-off iterates investorAddresses, fixed at 3 in setUp
    # --solver cvc5-int : the pro-rata proof divides (stake * loss / totalFunds).
    #                  cvc5's integer encoding discharges it in ~2s; the default
    #                  bitvector solvers (yices, bitwuzla) time out past 120s.
    command:
      - "--contract"
      - "VerifyTest"
      - "--loop"
      - "4"
      - "--solver"
      - "cvc5-int"
      - "--solver-timeout-assertion"
      - "120000"

  # ------------------------------------------------------------ e2e pipeline
  # Full local flow in containers: chain → deploy → webapp → playwright.
  #   docker compose --profile e2e up --abort-on-container-exit e2e
  # deploy.js switches the active deployment to 31337 — restore the demo one
  # afterwards: docker compose run --rm node 'node scripts/use-deployment.mjs 84532'
  chain:
    image: node:20.19.0
    profiles: ["e2e"]
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    environment:
      HOME: /app/.docker-home
      npm_config_update_notifier: "false"
    volumes:
      - .:/app
    command: ["bash", "-c", "npm ci --no-audit --no-fund && npx hardhat node --hostname 0.0.0.0"]
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e 'fetch(\"http://127.0.0.1:8545\",{method:\"POST\",headers:{\"content-type\":\"application/json\"},body:JSON.stringify({jsonrpc:\"2.0\",id:1,method:\"eth_blockNumber\",params:[]})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  deploy:
    image: node:20.19.0
    profiles: ["e2e"]
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    environment:
      HOME: /app/.docker-home
      LOCALHOST_RPC_URL: http://chain:8545
    volumes:
      - .:/app
    command: ["npx", "hardhat", "run", "deploy.js", "--network", "localhost"]
    depends_on:
      chain:
        condition: service_healthy
    restart: "no"

  webapp:
    image: node:20.19.0
    profiles: ["e2e"]
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app/webapp
    environment:
      HOME: /app/.docker-home
      npm_config_update_notifier: "false"
      # baked into the bundle at build time; the e2e browser resolves `chain`
      # on the compose network
      VITE_RPC_URL: http://chain:8545
    volumes:
      - .:/app
    command: ["bash", "-c", "npm ci --no-audit --no-fund && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"]
    depends_on:
      deploy:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e 'fetch(\"http://127.0.0.1:5173/\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  e2e:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    profiles: ["e2e"]
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app/e2e
    environment:
      HOME: /tmp
      npm_config_update_notifier: "false"
      WEBAPP_URL: http://webapp:5173
    volumes:
      - .:/app
    command: ["bash", "-c", "npm ci --no-audit --no-fund && npx playwright test"]
    depends_on:
      webapp:
        condition: service_healthy
